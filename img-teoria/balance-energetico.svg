<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" font-family="Georgia, serif">
  <rect width="420" height="240" fill="#FFFDF7"/>
  <text x="210" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#2C1F0E">Balance energético</text>
  <!-- fulcrum -->
  <polygon points="210,170 195,205 225,205" fill="#3D2C1A"/>
  <rect x="120" y="160" width="180" height="10" rx="5" fill="#B5603A"/>
  <!-- left pan: intake -->
  <line x1="150" y1="165" x2="150" y2="120" stroke="#3D2C1A" stroke-width="2"/>
  <ellipse cx="150" cy="118" rx="42" ry="12" fill="#7A9A52"/>
  <text x="150" y="100" text-anchor="middle" font-size="12" fill="#2C1F0E">Energía que entra</text>
  <text x="150" y="122" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">comida</text>
  <!-- right pan: expenditure -->
  <line x1="270" y1="165" x2="270" y2="120" stroke="#3D2C1A" stroke-width="2"/>
  <ellipse cx="270" cy="118" rx="42" ry="12" fill="#3A6E96"/>
  <text x="270" y="100" text-anchor="middle" font-size="12" fill="#2C1F0E">Energía que gastas</text>
  <text x="270" y="122" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">metabolismo + movimiento</text>
  <text x="210" y="232" text-anchor="middle" font-size="11" fill="#6b5d49">La calidad de la comida influye en tu hambre y saciedad</text>
</svg>
